name: Deploy to GitHub Pages

# Auto-build the Flutter web bundle and publish it to the gh-pages branch
# on every push to main. GitHub Pages then serves it at
# https://shuhub.xyz/peds-rehab/ within ~1-2 minutes of the workflow
# finishing.
#
# Manual dispatch is also enabled so you can force a redeploy from the
# Actions tab without pushing a new commit.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the built-in GITHUB_TOKEN can push to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --base-href /peds-rehab/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy ${{ github.sha }}"
